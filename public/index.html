<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Playlist</title>
    <style>
      :root {
        --primary: #0b77f2;
        --bg: #f0f2f5;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --success: #10b981;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans",
          sans-serif;
        background: linear-gradient(135deg, var(--bg) 0%, #e5e7eb 100%);
        color: var(--text);
        min-height: 100vh;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 16px;
      }

      .header {
        background: var(--card);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .header h1 {
        margin: 0 0 8px 0;
        font-size: 24px;
        color: var(--primary);
      }

      .header p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .upload-section {
        background: var(--card);
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .upload-buttons {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      .upload-btn {
        flex: 1;
        padding: 12px 16px;
        border: 2px dashed var(--primary);
        background: white;
        border-radius: 8px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
        font-size: 13px;
        font-weight: 500;
        color: var(--primary);
      }

      .upload-btn:hover {
        border-color: #0856c0;
        background: #f8faff;
      }

      .upload-btn.dragover {
        border-color: var(--success);
        background: #f0fdf4;
        color: var(--success);
      }

      .upload-btn input {
        display: none;
      }

      .upload-zone {
        background: linear-gradient(135deg, #f8faff 0%, #eff6ff 100%);
        border: 2px dashed var(--primary);
        border-radius: 8px;
        padding: 24px 16px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .upload-zone:hover {
        border-color: #0856c0;
        background: linear-gradient(135deg, #f0f8ff 0%, #e8f2ff 100%);
      }

      .upload-zone.dragover {
        border-color: var(--success);
        background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      }

      .upload-zone input {
        display: none;
      }

      .upload-icon {
        font-size: 32px;
        margin-bottom: 8px;
      }

      .upload-text {
        font-size: 14px;
        color: var(--muted);
      }

      .upload-text strong {
        color: var(--text);
      }

      .playlist {
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .playlist-header {
        background: #f9fafb;
        padding: 12px 16px;
        font-weight: 600;
        font-size: 14px;
        color: var(--muted);
        border-bottom: 1px solid #e5e7eb;
      }

      .playlist-empty {
        padding: 32px 16px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .track {
        padding: 12px 16px;
        border-bottom: 1px solid #f3f4f6;
        display: flex;
        gap: 12px;
        align-items: flex-start;
        transition: background 0.2s;
      }

      .track:last-child {
        border-bottom: none;
      }

      .track:hover {
        background: #f9fafb;
      }

      .track-checkbox {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: var(--primary);
        flex-shrink: 0;
        margin-top: 2px;
      }

      .track-info {
        flex: 1;
        min-width: 0;
      }

      .track-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        word-break: break-word;
        margin-bottom: 4px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
        transition: all 0.2s;
      }

      .track-name:hover {
        background: #eff6ff;
        color: var(--primary);
      }

      .track-name-input {
        width: 100%;
        padding: 4px 6px;
        font-size: 13px;
        border: 1px solid var(--primary);
        border-radius: 4px;
        outline: none;
        font-family: inherit;
      }

      .track-name-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(11, 119, 242, 0.1);
      }

      .track-meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .track-size {
        background: #f0f0f0;
        padding: 2px 6px;
        border-radius: 3px;
      }

      .track-group-select {
        padding: 3px 6px;
        font-size: 11px;
        border: 1px solid #bfdbfe;
        border-radius: 4px;
        background: #eff6ff;
        color: var(--primary);
        cursor: pointer;
        outline: none;
        transition: all 0.2s;
      }

      .track-group-select:hover,
      .track-group-select:focus {
        background: #dbeafe;
        border-color: var(--primary);
      }

      .track-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .btn-small {
        padding: 4px 8px;
        font-size: 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        background: #e5e7eb;
        color: var(--text);
      }

      .btn-small:hover {
        background: #d1d5db;
      }

      .btn-small.danger {
        background: #fee2e2;
        color: #dc2626;
      }

      .btn-small.danger:hover {
        background: #fecaca;
      }

      .btn-play {
        padding: 4px 8px;
        font-size: 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background: var(--primary);
        color: white;
        transition: all 0.2s;
      }

      .btn-play:hover {
        background: #0856c0;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal {
        background: var(--card);
        padding: 20px;
        border-radius: 12px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .modal h2 {
        margin: 0 0 16px 0;
        font-size: 18px;
        color: var(--text);
      }

      .modal-input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 16px;
        outline: none;
        font-family: inherit;
      }

      .modal-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(11, 119, 242, 0.1);
      }

      .modal-buttons {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
      }

      .modal-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .modal-btn.primary {
        background: var(--primary);
        color: white;
      }

      .modal-btn.primary:hover {
        background: #0856c0;
      }

      .modal-btn.secondary {
        background: #e5e7eb;
        color: var(--text);
      }

      .modal-btn.secondary:hover {
        background: #d1d5db;
      }

      .player {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--card);
        border-top: 1px solid #e5e7eb;
        padding: 12px;
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
        z-index: 100;
      }

      .player audio {
        width: 100%;
        max-width: 100%;
      }

      .player-title {
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text);
        word-break: break-word;
        max-height: 32px;
        overflow: hidden;
      }

      .container.with-player {
        padding-bottom: 140px;
      }

      .stats {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #e5e7eb;
      }

      @media (max-width: 480px) {
        .container {
          padding: 12px;
        }

        .header {
          padding: 16px;
        }

        .header h1 {
          font-size: 20px;
        }

        .header p {
          font-size: 13px;
        }

        .upload-buttons {
          flex-direction: column;
          gap: 10px;
        }

        .upload-btn {
          padding: 10px 12px;
          font-size: 12px;
        }

        .upload-zone {
          padding: 20px 12px;
        }

        .upload-icon {
          font-size: 28px;
        }

        .upload-text {
          font-size: 12px;
        }

        .track {
          padding: 10px 12px;
          gap: 10px;
        }

        .track-name {
          font-size: 12px;
        }

        .track-meta {
          font-size: 11px;
          gap: 6px;
        }

        .track-size {
          padding: 1px 4px;
          font-size: 10px;
        }

        .track-actions {
          gap: 4px;
        }

        .btn-small,
        .btn-play {
          padding: 3px 6px;
          font-size: 11px;
        }

        .player {
          padding: 10px;
        }

        .player-title {
          font-size: 11px;
          margin-bottom: 6px;
        }

        .player audio {
          height: 35px;
        }

        .stats {
          font-size: 11px;
          margin-top: 6px;
          padding-top: 6px;
        }
      }

      .loading {
        opacity: 0.5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="container with-player">
      <div
        class="header"
        style="display: flex; flex-direction: column; gap: 8px"
      >
        <div style="display: flex; align-items: center; gap: 12px">
          <h1 style="flex: 1; margin-bottom: 0">🎵 Playlist</h1>
          <select
            id="userSelect"
            style="
              padding: 4px 8px;
              border-radius: 6px;
              border: 1px solid #e5e7eb;
              font-size: 14px;
            "
          >
            <option value="TuanDarcy">TuanDarcy</option>
            <option value="Meridiem">Meridiem</option>
          </select>
        </div>
        <div style="display: flex; gap: 8px">
          <button
            id="tabUnlistened"
            class="tab-btn"
            style="
              flex: 1;
              padding: 6px 0;
              border: none;
              border-radius: 6px 0 0 6px;
              background: #e5e7eb;
              color: #1f2937;
              font-size: 14px;
              cursor: pointer;
            "
          >
            Chưa nghe
          </button>
          <button
            id="tabListened"
            class="tab-btn"
            style="
              flex: 1;
              padding: 6px 0;
              border: none;
              border-radius: 0 6px 6px 0;
              background: #f3f4f6;
              color: #6b7280;
              font-size: 14px;
              cursor: pointer;
            "
          >
            Đã nghe
          </button>
        </div>
        <p id="stats">Đang tải...</p>
      </div>

      <div class="upload-section">
        <div class="upload-buttons">
          <div class="upload-btn" id="uploadZone">
            📁 Kéo thả file<br />
            <span style="font-size: 11px; font-weight: normal">(MP3, MP4)</span>
            <input
              type="file"
              id="fileInput"
              accept=".mp3,.m4a,.wav,.ogg,.aac,.mp4"
              multiple
            />
          </div>
          <div class="upload-btn" id="uploadFolder">
            📂 Upload folder<br />
            <span style="font-size: 11px; font-weight: normal"
              >(Auto filter)</span
            >
            <input type="file" id="folderInput" webkitdirectory directory />
          </div>
        </div>
        <div class="upload-zone" id="dragZone">
          <div class="upload-icon">⬇️</div>
          <div class="upload-text">
            <strong>Hoặc kéo thả file/folder vào đây</strong><br />
            Hỗ trợ: MP3, MP4, WAV, M4A, AAC, OGG
          </div>
        </div>
      </div>

      <div class="playlist" id="playlist">
        <div class="playlist-header">Danh sách audio</div>
        <div class="playlist-empty">Chưa có file nào</div>
      </div>
    </div>

    <div class="player" id="player" style="display: none">
      <div class="player-title" id="playerTitle"></div>
      <audio controls id="audioPlayer"></audio>
      <div class="stats" id="playerStats"></div>
    </div>

    <div class="modal-overlay" id="renameModal">
      <div class="modal">
        <h2>📝 Đổi tên file</h2>
        <input
          type="text"
          id="renameInput"
          class="modal-input"
          placeholder="Tên file mới"
        />
        <div class="modal-buttons">
          <button class="modal-btn secondary" onclick="closeRenameModal()">
            Hủy
          </button>
          <button class="modal-btn primary" onclick="saveRename()">Lưu</button>
        </div>
      </div>
    </div>

    <script>
      const uploadZone = document.getElementById("uploadZone");
      const uploadFolder = document.getElementById("uploadFolder");
      const dragZone = document.getElementById("dragZone");
      const fileInput = document.getElementById("fileInput");
      const folderInput = document.getElementById("folderInput");
      const playlist = document.getElementById("playlist");
      const player = document.getElementById("player");
      const audioPlayer = document.getElementById("audioPlayer");
      const playerTitle = document.getElementById("playerTitle");
      const stats = document.getElementById("stats");
      const renameModal = document.getElementById("renameModal");
      const renameInput = document.getElementById("renameInput");

      let currentRenameId = null;
      const GROUPS = ["TuanDarcy", "Meridiem"];
      const AUDIO_EXTENSIONS = [".mp3", ".m4a", ".wav", ".ogg", ".aac", ".mp4"];
      let currentUser = localStorage.getItem("playlist_user") || "TuanDarcy";
      let currentTab = localStorage.getItem("playlist_tab") || "unlistened";

      // Drag and drop
      dragZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dragZone.classList.add("dragover");
        uploadZone.classList.add("dragover");
      });

      dragZone.addEventListener("dragleave", () => {
        dragZone.classList.remove("dragover");
        uploadZone.classList.remove("dragover");
      });

      dragZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dragZone.classList.remove("dragover");
        uploadZone.classList.remove("dragover");
        handleFiles(e.dataTransfer.items || e.dataTransfer.files);
      });

      uploadZone.addEventListener("click", () => fileInput.click());
      uploadFolder.addEventListener("click", () => folderInput.click());
      fileInput.addEventListener("change", (e) => handleFiles(e.target.files));
      folderInput.addEventListener("change", (e) =>
        handleFiles(e.target.files),
      );

      async function handleFiles(items) {
        dragZone.classList.add("loading");
        uploadZone.classList.add("loading");
        uploadFolder.classList.add("loading");

        const files = [];

        // Handle DataTransferItemList (from drag-drop)
        if (items && items[0] && items[0].getAsEntry) {
          for (let item of items) {
            const entry = item.getAsEntry();
            if (entry.isFile) {
              files.push(item.getAsFile());
            } else if (entry.isDirectory) {
              await traverseDirectory(entry, files);
            }
          }
        } else {
          // Handle FileList (from input)
          for (let file of items) {
            files.push(file);
          }
        }

        // Filter audio files
        const audioFiles = files.filter((file) => {
          const ext = "." + file.name.split(".").pop().toLowerCase();
          return AUDIO_EXTENSIONS.includes(ext);
        });

        // Upload filtered files
        for (const file of audioFiles) {
          const formData = new FormData();
          formData.append("audio", file);
          try {
            await fetch("/api/upload", { method: "POST", body: formData });
          } catch (error) {
            console.error("Upload error:", error);
          }
        }

        dragZone.classList.remove("loading");
        uploadZone.classList.remove("loading");
        uploadFolder.classList.remove("loading");
        loadPlaylist();
      }

      async function traverseDirectory(entry, files) {
        if (entry.isFile) {
          const file = await new Promise((resolve) => entry.file(resolve));
          files.push(file);
        } else if (entry.isDirectory) {
          const reader = entry.createReader();
          const entries = await new Promise((resolve) =>
            reader.readEntries(resolve),
          );
          for (let e of entries) {
            await traverseDirectory(e, files);
          }
        }
      }

      function getUserListened() {
        try {
          return (
            JSON.parse(
              localStorage.getItem("playlist_listened_" + currentUser) || "{}",
            ) || {}
          );
        } catch {
          return {};
        }
      }

      function setUserListened(obj) {
        localStorage.setItem(
          "playlist_listened_" + currentUser,
          JSON.stringify(obj),
        );
      }

      async function loadPlaylist() {
        try {
          const res = await fetch("/api/files");
          const data = await res.json();
          const files = data.files || [];
          const userListened = getUserListened();

          // Tách file đã nghe/chưa nghe theo user
          const unlistened = files.filter((f) => !userListened[f.id]);
          const listened = files.filter((f) => userListened[f.id]);

          stats.textContent = `${listened.length}/${files.length} đã nghe`;

          let html = '<div class="playlist-header">Danh sách audio</div>';
          let showFiles = currentTab === "unlistened" ? unlistened : listened;
          if (showFiles.length === 0) {
            html += `<div class="playlist-empty">${currentTab === "unlistened" ? "Không còn file nào chưa nghe!" : "Chưa có file nào đã nghe."}</div>`;
          } else {
            for (const file of showFiles) {
              const name = file.id.replace(/^\d+_/, "");
              const currentGroup = file.group || GROUPS[0];
              html += `
              <div class="track">
                <input type="checkbox" class="track-checkbox" ${userListened[file.id] ? "checked" : ""} 
                  onchange="toggleListened('${escapeHtml(file.id)}', this.checked)">
                <div class="track-info">
                  <div class="track-name" onclick="openRenameModal('${escapeHtml(file.id)}', '${escapeHtml(name)}')">${escapeHtml(name)}</div>
                  <div class="track-meta">
                    <span class="track-size">${formatSize(file.size)}</span>
                    <select class="track-group-select" onchange="changeGroup('${escapeHtml(file.id)}', this.value)">
                      ${GROUPS.map((g) => `<option value="${escapeHtml(g)}" ${g === currentGroup ? "selected" : ""}>${escapeHtml(g)}</option>`).join("")}
                    </select>
                  </div>
                </div>
                <div class="track-actions">
                  <button class="btn-play" onclick="playFile('${escapeHtml(file.id)}', '${escapeHtml(name)}', '${escapeHtml(file.url)}')">▶</button>
                  <button class="btn-small danger" onclick="deleteFile('${escapeHtml(file.id)}')">✕</button>
                </div>
              </div>
            `;
            }
          }
          playlist.innerHTML = html;
        } catch (error) {
          console.error("Load error:", error);
          playlist.innerHTML =
            '<div class="playlist-empty">Lỗi tải danh sách</div>';
        }
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function formatSize(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round((bytes / Math.pow(k, i)) * 10) / 10 + " " + sizes[i];
      }

      function playFile(id, name, url) {
        playerTitle.textContent = name;
        audioPlayer.src = url;
        audioPlayer.play();
        player.style.display = "block";
        audioPlayer.onended = () => toggleListened(id, true);
      }

      async function toggleListened(id, listened) {
        // Lưu trạng thái đã nghe vào localStorage theo user
        const userListened = getUserListened();
        if (listened) {
          userListened[id] = true;
        } else {
          delete userListened[id];
        }
        setUserListened(userListened);
        loadPlaylist();
      }

      async function changeGroup(id, group) {
        try {
          await fetch(`/api/group/${id}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ group }),
          });
          loadPlaylist();
        } catch (error) {
          console.error("Error:", error);
        }
      }

      function openRenameModal(id, currentName) {
        currentRenameId = id;
        renameInput.value = currentName;
        renameModal.classList.add("active");
        renameInput.focus();
        renameInput.select();
      }

      function closeRenameModal() {
        renameModal.classList.remove("active");
        currentRenameId = null;
        renameInput.value = "";
      }

      async function saveRename() {
        if (!currentRenameId || !renameInput.value.trim()) {
          closeRenameModal();
          return;
        }

        try {
          await fetch(`/api/rename/${currentRenameId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ newName: renameInput.value.trim() }),
          });
          closeRenameModal();
          loadPlaylist();
        } catch (error) {
          console.error("Error:", error);
          alert("Lỗi đổi tên file");
        }
      }

      renameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") saveRename();
        if (e.key === "Escape") closeRenameModal();
      });

      renameModal.addEventListener("click", (e) => {
        if (e.target === renameModal) closeRenameModal();
      });

      async function deleteFile(id) {
        if (confirm("Xóa file này?")) {
          try {
            await fetch(`/api/files/${id}`, { method: "DELETE" });
            loadPlaylist();
          } catch (error) {
            console.error("Error:", error);
          }
        }
      }

      // Tab & user select logic
      document.getElementById("userSelect").value = currentUser;
      document.getElementById("userSelect").addEventListener("change", (e) => {
        currentUser = e.target.value;
        localStorage.setItem("playlist_user", currentUser);
        loadPlaylist();
      });
      document.getElementById("tabUnlistened").addEventListener("click", () => {
        currentTab = "unlistened";
        localStorage.setItem("playlist_tab", currentTab);
        document.getElementById("tabUnlistened").style.background = "#e5e7eb";
        document.getElementById("tabUnlistened").style.color = "#1f2937";
        document.getElementById("tabListened").style.background = "#f3f4f6";
        document.getElementById("tabListened").style.color = "#6b7280";
        loadPlaylist();
      });
      document.getElementById("tabListened").addEventListener("click", () => {
        currentTab = "listened";
        localStorage.setItem("playlist_tab", currentTab);
        document.getElementById("tabListened").style.background = "#e5e7eb";
        document.getElementById("tabListened").style.color = "#1f2937";
        document.getElementById("tabUnlistened").style.background = "#f3f4f6";
        document.getElementById("tabUnlistened").style.color = "#6b7280";
        loadPlaylist();
      });
      // Set initial tab style
      if (currentTab === "listened") {
        document.getElementById("tabListened").style.background = "#e5e7eb";
        document.getElementById("tabListened").style.color = "#1f2937";
        document.getElementById("tabUnlistened").style.background = "#f3f4f6";
        document.getElementById("tabUnlistened").style.color = "#6b7280";
      } else {
        document.getElementById("tabUnlistened").style.background = "#e5e7eb";
        document.getElementById("tabUnlistened").style.color = "#1f2937";
        document.getElementById("tabListened").style.background = "#f3f4f6";
        document.getElementById("tabListened").style.color = "#6b7280";
      }
      loadPlaylist();
      setInterval(loadPlaylist, 3000);
    </script>
  </body>
